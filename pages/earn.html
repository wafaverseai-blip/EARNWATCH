<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Earn – Watch Ads</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <nav>
    <a href="/pages/index.html">Home</a>
    <a href="/pages/earn.html">Earn</a>
    <a href="/pages/advertise.html">Advertise</a>
    <span id="user-info"></span>
  </nav>
  <main>
    <h2>Watch & Earn</h2>
    <div id="ad-container">
      <div id="ad-status">Loading next ad...</div>
      <video id="ad-video" controls disablepictureinpicture controlslist="nodownload noplaybackrate" style="width:100%; max-height:60vh;"></video>
      <div id="timer-display">00:30</div>
      <button id="watch-btn" disabled>Watch to earn ₹1</button>
    </div>
    <p>Current balance: ₹<span id="balance">0.00</span></p>
    <button id="withdraw-btn">Withdraw</button>
    <div id="withdraw-form" style="display:none;">
      <input type="text" id="upi-id" placeholder="Enter UPI ID (e.g., name@okhdfcbank)">
      <input type="number" id="amount" placeholder="Amount">
      <button id="request-withdraw">Request Withdrawal</button>
    </div>
  </main>
  <script src="/public/script.js"></script>
</body>
</html>
